        { id: 297, c: "强化学习与智能体", s: "以下哪一项不属于医疗诊断智能体的  PEAS  任务环境（）", o: ["医院", "医生的行医执照", "触摸屏", "疾病诊断准确性"], a: "B", e: "在医疗问诊Agent的PEAS要素切片中，医院属于外部环境，触摸屏属于传感器/输入端，诊断准确率属于高层的性能度量。而现实中的‘医生的行医执照’非该AI系统的工程元组件。" },
        { id: 298, c: "强化学习与智能体", s: "以下哪一项不能作为智能体环境类型的分类依据（）", o: ["传感器是否获取环境的所有状态", "智能体的决策是否需要获取环境状态", "环境的下一个状态是否完全取决于当前状态和智能体的行动", "智能体当前行动的选择是否不依赖于以前的行动"], a: "B", e: "判断环境属于完全/部分可观察、确定/随机、片段/延续等，均源自对环境固有数理规律的挖掘。所有智能体为了理性生存，其‘决策过程必须且毫无疑问均需要获取环境状态信息’，故B不能用作环境分类的差别依据。" },
        { id: 299, c: "强化学习与智能体", s: "以下关于环境类型的说法哪项是正确的（）", o: ["自动驾驶任务中环境是完全可观察的", "围棋任务中环境中环境是部分可观察的", "零件挑选机器人的任务环境是动态的", "自动驾驶任务中环境是离散的"], a: "C", e: "零件挑选机器人在流水线上工作时，由于工件流持续流动且外部环境状态随着物理时间迁徙在不断发生不可逆的物理位移改变（非静止），因而属于典型的动态（Dynamic）环境。" },
        { id: 300, c: "自动驾驶", s: "根据人工智能中智能体任务环境分类标准，以下关于自动驾驶环境属性的分析，哪项是不正确的？", o: ["自动驾驶系统属于部分可观察环境。", "在行驶过程中属于片段式环境。", "道路上的其他人类驾驶员多属于多智能体环境。", "由于车辆轮胎打滑属于随机性环境。"], a: "B", e: "自动驾驶是一个典型的连续、长程衔接的‘延续式/序列式（Sequential）’复杂任务环境。当前的任何变道或刹车动作，都会对未来时间步长内其车辆所处位置及周边其他车辆的交互状态分布造成极其深远的连锁波及影响，绝对非相互断绝、片段式的环境。" },
        { id: 301, c: "强化学习与智能体", s: "以下关于医疗诊断智能体环境类型的说法哪项是正确的（）", o: ["环境是部分可观察的", "环境下一状态完全取决于智能体行动", "环境随智能体思考发生改变", "是多智能体任务环境"], a: "A", e: "人体内隐生理机能的病灶由于深埋皮肤之下且时刻伴随复杂的生理异质性，AI传感器（如CT、检验化验单）只能捕获局部碎片片面表征，无法百分百摸清生命体底层的全景状态，属于绝对的部分可观察环境。" },
        { id: 302, c: "强化学习与智能体", s: "关于智能体的分类，以下哪个不属于智能体的基本类型（）", o: ["简单反射型智能体", "基于模型的反射型智能体", "理性智能体", "基于目标的智能体"], a: "C", e: "理性（Rationality）是设计和评测所有大系智能体时统一遵循的最高通用宏观哲学指导原则，而非并列划分出来的某种单一低阶‘具体工程实现智能体类型’。" },
        { id: 303, c: "强化学习与智能体", s: "对于表驱动的智能体，以下那种说法是不正确的（）", o: ["构建一个表记录所有的感知序列及其最佳行动", "智能体在运行时会根据感知，通过查表方式来决定行动", "一般很容易获取查询表的所有条目", "需要花费大量的时间构建表，甚至无法构建"], a: "C", e: "现实物理客观大世界的特征排列组合规模呈恐怖的组合数爆炸。即便是最基础的文字问答或视觉滑窗，其对应的全历史感知序列查表总空间条目在数学上均是天文数字，‘在工程实践中根本不可能轻松获取和构建完整’。" },
        { id: 304, c: "强化学习与智能体", s: "以下关于简单反射型智能体说法不正确的是（）", o: ["简单反射型智能体基于状态 - 动作规则进行决策", "需要与环境进行交互", "基于当前的感知选择行动，不涉及目标、效用等信息", "需要基于感知历史进行决策"], a: "D", e: "简单反射型智能体（Simple Reflex Agent）最大的数理缺陷正是其两耳不闻历史：它严格且仅仅盲目盯死当前单一步骤瞬时流入的感知信号，依据写死的IF-THEN规则条件执行短路匹配，‘完全不涵盖、不需要感知历史’。" },
        { id: 305, c: "强化学习与智能体", s: "以下关于基于目标的智能体说法不正确的是（）", o: ["为了达到目标选择合适的行动", "只考虑一个短期看起来有利的行动并执行", "为达到目标，可能会考虑一个很长的可能行动序列", "会思考如果执行这个行为后，世界会怎样变化"], a: "B", e: "基于目标的智能体（Goal-based Agent）为了顺利达成长远给定的终期战略靶向，必须具备强大的长程搜索、全局前向推演与长路轨迹规划能力，绝对不会只盲目贪婪地去执行一个贪心短视的单步有利动作。" },
        { id: 306, c: "强化学习与智能体", s: "以下关于基于效用的智能体说法不正确的是（）", o: ["需要与环境交互", "需要更通用的性能度量", "智能体的决策过程中涉及到效用函数的使用", "性能度量的反馈信息比较单一"], a: "D", e: "基于效用的智能体（Utility-based Agent）最大的跨越在于其引入了复杂的效用函数，不仅能判定是否达成目标，更能平滑、多维度加权评估达成该目标付出的资源代价、路线优雅度及安全舒适度，其性能度量反馈极其丰富。" },
        { id: 307, c: "强化学习与智能体", s: "以下关于学习智能体说法不正确的是（）", o: ["以基本知识开始执行动作，能够通过学习自动行动与适应", "学习元素从评价器获得反馈，这些反馈描述了智能体在固定性能标准方面的表现", "不需要行动的反馈", "需要从环境中学习"], a: "C", e: "学习智能体（Learning Agent）为了能够让自身的决策引擎持续完成更新、纠偏纠错并平滑自适应，其在闭环运行管线中‘无时无刻不需要极其精准且可导地捕获来自真实物理环境对动作做出的高价值反馈反馈信号’。" },
        { id: 308, c: "机器人学", s: "以下哪一项是机器人的基本组成？", o: ["传感器、处理器、效应器", "显示器、键盘、鼠标", "电池、外壳、轮子", "软件、硬件、网络"], a: "A", e: "一个高度健全、面向具体作业物理环境的智能实体机器人在宏观系统工程架构上必不可少地包含三大底层硬件总线：专门负责感知数据的传感器、负责计算决策的中央处理器、以及最终施加物理功勋和执行动作的效应器/执行器。" },
        { id: 309, c: "机器人学", s: "下列关于机器人的说法中，正确的是：", o: ["所有机器人都需要人工控制", "机器人只能在工厂中使用", "机器人是一种具备感知、决策和执行能力的智能系统", "机器人不具备自主性"], a: "C", e: "现代先进机器人学将其统一统一定义为一类完全跨越虚拟数字空间与真实物理空间的、有机融汇了‘强有力多维周遭环境环境自感知、高级中央自主逻辑推理判断、以及物理机械执行三大功能模块合一’的高阶闭环智能自动化实体系统。" },
        { id: 310, c: "机器人学", s: "机器人被称为 “ 智能决策的实体 ” ，是因为它能：", o: ["模拟人类行为", "独立完成所有任务", "具备感知、处理和执行的能力", "完全替代人类"], a: "C", e: "机器人能够摆脱单纯写死的硬编码程序控制、根据外部错综复杂的未知环境干扰自主权衡并输出合理的策略路径，这正是得益于其具备了‘由传感器感知领航、由处理器中继重构决策、最后下传给效应器高效运动’的统一能力要素。" },
        { id: 311, c: "机器人学", s: "激光雷达属于哪类传感器？", o: ["无源传感器", "温度传感器", "有源传感器", "接触式传感器"], a: "C", e: "激光雷达（LiDAR）在物理学原理上属于典型的有源/主动传感器（Active Sensor）。它无需依赖任何自然界外来的外界环境光，而是由系统自身内部高频向外主动射出特定的密集激光脉冲能量流，通过测算反射回的时间差（ToF）来构建外部物体的三维空间点云地图。" },
        { id: 312, c: "机器人学", s: "机器人 “ 看见 ” 前方物体，是通过哪个部件完成的？", o: ["机械臂", "传感器", "处理器", "执行器"], a: "B", e: "机器人捕获外界光影、测算障碍物距离等宏观感知层面的动作，在最底层完全依赖于搭载的图像摄像头、超声波、红外探测器或激光雷达等统称的‘环境感知传感器（Sensors）’。" },
        { id: 313, c: "机器人学", s: "有源传感器与无源传感器的主要区别是：", o: ["有源传感器更容易安装和部署", "有源传感器主动发出信号", "无源传感器使用电池", "无源传感器只能探测金属"], a: "B", e: "传感器大系中划分有源与无源的最本源分水岭在于其探知物理世界时的光学/声学逻辑：有源传感器依靠‘主动对外发射物理高能探测信号流（如激光、无线电波）并捕获回波’；而无源传感器（如红外相机）只能静态、被动截获环境原生的向外辐射能量。" },
        { id: 314, c: "机器人学", s: "机器人进行逻辑推理和决策主要依靠哪个部件？", o: ["传感器", "摄像头", "处理器", "电源"], a: "C", e: "机器人内部搭载的操作系统（如ROS）、高级深度神经网络权重计算、以及决策控制树程序，其所有数学底座层面的多维矩阵乘加运算和逻辑指令跳转，完全100%全权托管运行在机器人内部承载的‘中央处理器/计算主板（Processor / CPU / GPU）’上。" },
        { id: 315, c: "机器人学", s: "下列哪个选项可以作为机器人的 “ 眼睛 ” ：", o: ["电源", "红外传感器", "激光切割装置", "电机"], a: "B", e: "红外传感器（以及光学工业相机、双目立体摄像头等）可以通过高效捕获并成像外界红外光谱流信息来为中央的大脑提供图像级参考，相当于为机器人安插了看穿现实环境迷雾的‘机械视觉双眼’。" },
        { id: 316, c: "机器人学", s: "机器人进行自我判断并选择行为的能力来自于：", o: ["数据库", "决策程序", "执行机构", "能源系统"], a: "B", e: "机器人能够做到在面对突发突发障碍物时自动绕行或急停、完成复杂工件码垛，其核心本领完全来自于内部固化部署的、集成了现代路径规划与自适应鲁棒控制理论的‘核心决策控制程序算法’。" },
        { id: 317, c: "机器人学", s: "机器人将感知信息转为行动指令的是：", o: ["电源系统", "通信模块", "处理器", "液压机构"], a: "C", e: "中央嵌入式芯片处理器作为机器人的核心数字枢纽，一手全面接管读取各级硬件传感器送来的高维杂乱原始电信号特征数据，一手运行高级感知算法并将其高效实时翻译变换为控制关节电机运转输出偏角的具体‘底层动作驱动伺服指令’。" },
        { id: 318, c: "机器人学", s: "有源传感器最大的优势是：", o: ["造价低", "主动感知并构建环境模型", "可以完全替代人类视觉", "不依赖电源"], a: "B", e: "有源传感器（如毫米波雷达、LiDAR）由于具备独立向外投射特定探测频段信号的能力，使其能够彻底摆脱受限于外界太阳光照明、反光等客观光热天气干扰带来的感知失效，从而可以完全做到“全天候自主、主动地对周围高维物理现实进行高精度的深度三维环境建模”。" },
        { id: 319, c: "机器人学", s: "以下关于机器人自主性的描述，正确的是：", o: ["工业机械臂完全不能适应环境变化", "扫地机器人能根据房间布局自主规划路径", "火星车需要人工操作每一个动作", "手术机器人不依赖任何预设程序"], a: "B", e: "现代智能家用扫地机器人是其具备低级自主性（Autonomy）的工业普及范例：它能完全依赖搭载的LiDAR或视觉SLAM算法，在全新未知的异构家庭户型内一边行走一边测绘，并自主规划出覆盖率最高且防卡阻跌落的最优全局清洁路径路径。" },
        { id: 320, c: "机器人学", s: "机器人系统中，三大核心模块的协作流程正确顺序是：", o: ["效应器  →  传感器  →  处理器", "处理器  →  传感器  →  效应器", "传感器  →  处理器  →  效应器", "电源  →  执行器  →  显示器"], a: "C", e: "一个标准机器人的实时闭环控制信息流水流向完全不可逆且严格契合如下经典控制论回路：“首先由最外层的传感器高频截获物理世界的原始信号数据，接着将其上传至处理器执行高级特征对齐与决策规划算法计算，最后由处理器把生成的控制信号下传传导给最末端的效应器关节去精确输出物理层面的物理机械做功动作”。" },
        { id: 321, c: "AI安全与治理", s: "以下哪项不属于人工智能自身的内生风险？", o: ["自动驾驶系统错误决策导致事故", "医疗  AI  因数据保护不力泄露隐私", "生成模型伪造虚假新闻误导公众", "模型推理过程不透明难以信任"], a: "C", e: "生成模型伪造虚假新闻属于外部恶意滥用导致的衍生风险，而非系统设计或技术缺陷产生的原生内生风险。" },
        { id: 322, c: "AI安全与治理", s: "AI  安全研究的核心目标之一是提升模型的 ______ ，即模型在噪声、干扰或恶意攻击下仍能保持稳定输出的能力。", o: ["透明性", "鲁棒性", "公平性", "可解释性"], a: "B", e: "鲁棒性是指系统在面临噪声、对抗攻击或长尾干扰下，仍能保持正确稳定输出的稳健性能。" },
        { id: 323, c: "AI安全与治理", s: "以下哪项属于  AI  伦理治理中 “ 透明性 ” 原则的具体要求？", o: ["确保模型训练数据来源合法", "保证用户不滥用  AI", "向用户说明  AI  决策逻辑与依据", "限制模型的使用场景"], a: "C", e: "透明性原则要求向用户明示并合理解释算法系统的内在决策逻辑、运行机制与判别依据。" },
        { id: 324, c: "AI安全与治理", s: "为防范数据泄露风险， AI  开发中应优先采取的措施是 ______ 。", o: ["清洗训练数据中的有害内容", "使用差分隐私技术", "提高训练数据规模", "部署模型压缩工具"], a: "B", e: "差分隐私通过引入精密可控的数理噪声提供严密的隐私保护，能有效防止模型在交互或重训中泄露敏感训练数据。" },
        { id: 325, c: "AI安全与治理", s: "在  AI  安全伦理风险防范技术中，通过调整训练过程使模型对输入扰动更鲁棒的方法是 ______ 。", o: ["数据增广", "对抗训练", "数据生成", "价值对齐"], a: "B", e: "对抗训练通过在训练循环中主动注入特定对抗扰动样本进行重训，从而直接提升和固化模型的抗干扰边界。" },
        { id: 326, c: "AI安全与治理", s: "以下哪项不属于  AI  伦理指导原则中的关键要求？", o: ["透明性", "数据生成", "隐私保护", "公平性"], a: "B", e: "数据生成属于具体的技术或工程操作手段，而透明性、隐私保护和公平性才是AI伦理的核心指导原则。" },
        { id: 327, c: "AI安全与治理", s: "AI  技术对社会就业的冲击属于以下哪种风险？", o: ["内生风险", "衍生风险", "技术漏洞", "数据偏见"], a: "B", e: "技术颠覆带来的劳动力替代属于AI大规模部署并融入社会经济系统后引发的次生社会影响，定义为衍生风险。" },
        { id: 328, c: "AI安全与治理", s: "以下哪项属于  AI  系统的内生风险？", o: ["生成虚假新闻误导公众", "模型决策过程不可解释", "技术滥用导致劳资矛盾", "自动化取代传统岗位"], a: "B", e: "模型不可解释性（黑箱效应）是由深层网络高维非线性复合结构天然带来的技术瓶颈，属于典型的原生内生风险。" },
        { id: 329, c: "AI安全与治理", s: "公平性风险的主要产生原因不包括以下哪一项？", o: ["训练数据中的历史偏见", "模型优化目标忽略公平性约束", "训练过程中缺乏偏见检测算法", "模型无法理解用户指令"], a: "D", e: "模型无法理解用户指令属于大模型能力基准问题，而历史数据偏见和缺乏模型公平约束才是导致算法歧视的根源。" },
        { id: 330, c: "AI安全与治理", s: "有害性风险仅涉及生成暴力、色情等恶意内容，不包括伦理问题。这句话是否正确？", o: ["正确", "错误"], a: "B", e: "有害性风险外延广泛，除了暴力和色情，还深刻包含价值观扭曲、教唆违法、诱导自残等深层伦理道德危机。" },
        { id: 331, c: "AI安全与治理", s: "人工智能模型在微调后丢失原有知识的现象称为 ______ 。", o: ["数据偏差", "灾难性遗忘", "过拟合", "训练不稳定"], a: "B", e: "灾难性遗忘指神经网络在学习新任务（如增量微调）时，新权重的覆写导致先前存储的通用泛化知识发生严重丢失。" },

        { id: 339, c: "AI安全与治理", s: "模型做出判断时高度依赖复杂的参数与非线性映射，使得其推理过程难以追溯，这种 “________” 现象妨碍了可解释性。", o: ["信息冗余", "黑箱效应", "神经激活偏差", "局部最优陷阱"], a: "B", e: "深度学习模型由于具有海量参数与复杂的非线性映射，使内部具体因果路径极其黑盒化、难以逆向追踪，即黑箱效应。" },

        { id: 354, c: "AI安全与治理", s: "从更完善的风险防范理论体系角度看，除了下列哪项外，都是需要采取的措施？", o: ["制定合理且统一的  AI  价值体系", "发展更系统的安全优化理论", "增加  AI  系统的计算能力", "分析安全风险防范的局限与制衡"], a: "C", e: "野蛮增加系统的物理底层大算力属于单纯的硬件扩张，不属于完善安全防御与对齐理论治理体系中所需的学术和规制措施。" },

      ];

      const OPTION_KEYS = ["A", "B", "C", "D"];

      // 封装的 Lucide 网页原生图标转换组件
      function Icon({ name, className = "w-4 h-4" }) {
        const spanRef = useRef(null);

        useEffect(() => {
          if (spanRef.current) {
            spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
            if (window.lucide && typeof window.lucide.createIcons === "function") {
              window.lucide.createIcons({
                nodeList: [spanRef.current.querySelector('i')]
              });
            }
          }
        }, [name, className]);

        return <span ref={spanRef} className="inline-flex items-center justify-center pointer-events-none" />;
      }

      // markdown 基础语法：粗体 ** 以及行内代码 ` 代码框
      function renderMarkdownStyle(text, parentKey) {
        if (!text) return null;
        const boldParts = text.split(/(\*\*[^\*]+\*\*)/g);
        return (
          <span key={parentKey}>
            {boldParts.map((boldPart, bIdx) => {
              if (boldPart.startsWith("**") && boldPart.endsWith("**")) {
                const boldContent = boldPart.slice(2, -2);
                return <strong key={bIdx} className="font-bold text-[#0F172A]">{boldContent}</strong>;
              }
              const codeParts = boldPart.split(/(\`[^\`]+\`)/g);
              return (
                <span key={bIdx}>
                  {codeParts.map((codePart, cIdx) => {
                    if (codePart.startsWith("`") && codePart.endsWith("`")) {
                      const codeContent = codePart.slice(1, -1);
                      return (
                        <code key={cIdx} className="px-1 py-0.5 bg-slate-100 border border-slate-200/60 rounded font-mono text-xs text-indigo-600 font-semibold mx-0.5">
                          {codeContent}
                        </code>
                      );
                    }
                    return codePart;
                  })}
                </span>
              );
            })}
          </span>
        );
      }

      const LATEX_COMMANDS = [
        "leftarrow", "rightarrow", "leftrightarrow", "partial", "epsilon", "varepsilon",
        "omicron", "alpha", "gamma", "delta", "theta", "vartheta", "kappa", "lambda",
        "sigma", "omega", "frac", "sqrt", "cdot", "times", "div", "beta", "zeta",
        "iota", "rho", "tau", "upsilon", "phi", "varphi", "chi", "psi", "sum",
        "prod", "lim", "log", "ln", "eta", "le", "leq", "ge", "geq", "neq", "approx",
        "equiv", "infty", "in", "notin", "subset", "subseteq", "cup", "cap", "forall",
        "exists", "nabla", "vec", "hat", "bar", "tilde", "dot", "ddot", "nu", "mu",
        "pi", "xi"
      ].sort((a, b) => b.length - a.length);

      const LATEX_COMMAND_REGEX = new RegExp(`(?<!\\\\)\\b(${LATEX_COMMANDS.join("|")})\\b`, "g");

      function normalizeMathForKatex(mathText) {
        return mathText
          // JS 字符串中单反斜杠的 \t 会被解释成制表符，常见于 \times、\theta、\tau。
          .replace(/\t(?=imes|heta|au)/g, "\\t")
          .replace(/⟨/g, "\\langle ")
          .replace(/⟩/g, "\\rangle ")
          .replace(LATEX_COMMAND_REGEX, "\\$1");
      }

      function renderKatex(mathText, displayMode) {
        const cleanMath = normalizeMathForKatex(mathText.trim());
        return window.katex.renderToString(cleanMath, {
          throwOnError: false,
          displayMode,
          strict: false,
          trust: false
        });
      }

      // 终极全场景数学符号与 LaTeX 编译器适配预处理函数
      function preprocessMathText(text) {
        if (!text) return "";

        return text.replace(
          /(\$\$)([\s\S]*?)(\$\$)|(\$)((?:[^\$]|\\\$)*?)(\$)|(\\\[)([\s\S]*?)(\\\])|(\\\()([\s\S]*?)(\\\))/g,
          (match, blockStart, blockMath, blockEnd, inlineStart, inlineMath, inlineEnd, bracketStart, bracketMath, bracketEnd, parenStart, parenMath, parenEnd) => {
            if (blockStart) return `${blockStart}${normalizeMathForKatex(blockMath)}${blockEnd}`;
            if (inlineStart) return `${inlineStart}${normalizeMathForKatex(inlineMath)}${inlineEnd}`;
            if (bracketStart) return `${bracketStart}${normalizeMathForKatex(bracketMath)}${bracketEnd}`;
            return `${parenStart}${normalizeMathForKatex(parenMath)}${parenEnd}`;
          }
        );
      }

      // 自动使用 KaTeX 渲染各类 LaTeX 公式与普通文本
      function FormattedText({ text }) {
        if (!text) return null;
        const preprocessedText = preprocessMathText(text);
        const mathRegex = /(\$\$(?:[^\$]|\\\$)*?\$\$|\$(?:[^\$]|\\\$)*?\$|\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\))/g;
        const segments = preprocessedText.split(mathRegex);

        return (
          <span>
            {segments.map((segment, idx) => {
              if (!segment) return null;

              const isBlockMath = (segment.startsWith("$$") && segment.endsWith("$$")) || (segment.startsWith("\\[") && segment.endsWith("\\]"));
              const isInlineMath = (segment.startsWith("$") && segment.endsWith("$")) || (segment.startsWith("\\(") && segment.endsWith("\\)"));

              if (isBlockMath) {
                const mathText = segment.slice(2, -2).trim();
                if (window.katex) {
                  try {
                    const html = renderKatex(mathText, true);
                    return <div key={`block-${idx}`} className="my-2 p-1 text-center overflow-x-auto bg-slate-50/50 rounded-lg text-slate-900" dangerouslySetInnerHTML={{ __html: html }} />;
                  } catch (err) {
                    return <pre key={`block-${idx}`} className="p-2 bg-rose-50 rounded text-rose-600 font-mono text-xs text-center">{segment}</pre>;
                  }
                } else {
                  return <pre key={`block-${idx}`} className="p-2 bg-slate-50 border rounded text-slate-600 font-mono text-xs text-center">{segment}</pre>;
                }
              }

              if (isInlineMath) {
                const mathText = segment.startsWith("$") ? segment.slice(1, -1) : segment.slice(2, -2);
                if (window.katex) {
                  try {
                    const html = renderKatex(mathText, false);
                    return <span key={`inline-${idx}`} className="inline-block align-middle mx-1 font-normal text-slate-900" dangerouslySetInnerHTML={{ __html: html }} />;
                  } catch (err) {
                    return <code key={`inline-${idx}`} className="px-1 py-0.5 bg-rose-50 border border-rose-100 rounded text-rose-650 font-mono text-xs mx-0.5">{segment}</code>;
                  }
                } else {
                  return <code key={`inline-${idx}`} className="px-1 py-0.5 bg-slate-50 border border-slate-150 rounded text-slate-600 font-mono text-xs mx-0.5">{segment}</code>;
                }
              }

              const extraMathRegex = /(\\[a-zA-Z]+(?:_\{?[a-zA-Z0-9_*+-]+\}?)?(?:\^\{?[a-zA-Z0-9_*+-]+\}?)?|⟨[^⟩]+⟩)/g;
              const subSegments = segment.split(extraMathRegex);

              return (
                <span key={`text-seg-${idx}`}>
                  {subSegments.map((subSeg, sIdx) => {
                    if (!subSeg) return null;
                    const isStandaloneLatex = subSeg.startsWith("\\");
                    const isStandaloneTuple = subSeg.startsWith("⟨") && subSeg.endsWith("⟩");

                    if (isStandaloneLatex || isStandaloneTuple) {
                      let mathText = subSeg;
                      if (window.katex) {
                        try {
                          const html = renderKatex(mathText, false);
                          return <span key={`standalone-${sIdx}`} className="inline-block align-middle mx-1 font-normal text-slate-900" dangerouslySetInnerHTML={{ __html: html }} />;
                        } catch (err) {
                          return <code key={`standalone-${sIdx}`} className="px-1 py-0.5 bg-slate-55 border rounded text-rose-600 font-mono text-xs mx-0.5">{subSeg}</code>;
                        }
                      } else {
                        return <code key={`standalone-${sIdx}`} className="px-1 py-0.5 bg-slate-50 border rounded text-indigo-600 font-mono text-xs mx-0.5">{subSeg}</code>;
                      }
                    }
                    return renderMarkdownStyle(subSeg, sIdx);
                  })}
                </span>
              );
            })}
          </span>
        );
      }

      function App() {
        // --- 状态定义 ---
        const [answers, setAnswers] = useState({});
        const [historyPath, setHistoryPath] = useState([]);
        const [currentPathIndex, setCurrentPathIndex] = useState(-1);
        const [seqIndex, setSeqIndex] = useState(0); // 顺序刷题索引
        const [studySeconds, setStudySeconds] = useState(0);
        const [activeTab, setActiveTab ] = useState("sequential"); // 默认展示顺序刷题
        const [localMultiSelect, setLocalMultiSelect] = useState([]); // 暂存多选题在未提交前的选项
        const [forcedMistakes, setForcedMistakes] = useState([]); // 新增：用于自主记录“蒙对了”强制加入错题本的题目ID集合
        const [starredQuestions, setStarredQuestions] = useState([]);
        const [reviewMode, setReviewMode] = useState(false);
        const [reviewQuestionIds, setReviewQuestionIds] = useState([]);
        const [reviewSeqIndex, setReviewSeqIndex] = useState(0);
        const [showGuide, setShowGuide] = useState(false);
        const [manualQuestionId, setManualQuestionId] = useState(null);
        
        // 【优化】新增：控制重置下拉菜单显隐的状态
        const [showResetDropdown, setShowResetDropdown] = useState(false);

        // 搜索相关状态
        const [dQuery, setDQuery] = useState("");
        const [dResults, setDResults] = useState([]);
        const [mQuery, setMQuery] = useState("");
        const [mResults, setMResults] = useState([]);
        const [isDSearchFocused, setIsDSearchFocused] = useState(false);
        const [isMSearchFocused, setIsMSearchFocused] = useState(false);

        // --- 初始化及本地状态持久化 ---
        useEffect(() => {
          try {
            const cachedAnswers = localStorage.getItem("ai_quiz_answers_v1");
            const cachedPath = localStorage.getItem("ai_quiz_history_path_v1");
            const cachedIndex = localStorage.getItem("ai_quiz_cur_index_v1");
            const cachedSeqIndex = localStorage.getItem("ai_quiz_seq_index_v1");
            const cachedSeconds = localStorage.getItem("ai_quiz_study_seconds_v1");
            const cachedTab = localStorage.getItem("ai_quiz_active_tab_v1");
            const cachedForced = localStorage.getItem("ai_quiz_forced_mistakes_v1");
            const cachedStarred = localStorage.getItem("ai_quiz_starred_questions_v1");
            const cachedGuideSeen = localStorage.getItem("ai_quiz_guide_seen_v1");

            if (cachedAnswers) setAnswers(JSON.parse(cachedAnswers));
            if (cachedSeqIndex) setSeqIndex(parseInt(cachedSeqIndex, 10));
            if (cachedTab) setActiveTab(cachedTab);
            if (cachedForced) setForcedMistakes(JSON.parse(cachedForced));
            if (cachedStarred) setStarredQuestions(JSON.parse(cachedStarred));
            if (cachedGuideSeen !== "1") setShowGuide(true);

            let parsedPath = [];
            if (cachedPath) parsedPath = JSON.parse(cachedPath);

            let parsedIndex = -1;
            if (cachedIndex) parsedIndex = parseInt(cachedIndex, 10);

            if (parsedPath.length === 0 || parsedIndex === -1) {
              const randQ = QUESTIONS_DATA[Math.floor(Math.random() * QUESTIONS_DATA.length)];
              setHistoryPath([randQ.id]);
              setCurrentPathIndex(0);
            } else {
              setHistoryPath(parsedPath);
              setCurrentPathIndex(parsedIndex);
            }

            if (cachedSeconds) setStudySeconds(parseInt(cachedSeconds, 10));
          } catch (e) {
            console.warn("读取 LocalStorage 缓存失败：", e);
            const randQ = QUESTIONS_DATA[Math.floor(Math.random() * QUESTIONS_DATA.length)];
            setHistoryPath([randQ.id]);
            setCurrentPathIndex(0);
          }
        }, []);

        useEffect(() => {
          if (historyPath.length > 0 && currentPathIndex !== -1) {
            try {
              localStorage.setItem("ai_quiz_answers_v1", JSON.stringify(answers));
              localStorage.setItem("ai_quiz_history_path_v1", JSON.stringify(historyPath));
              localStorage.setItem("ai_quiz_cur_index_v1", currentPathIndex.toString());
              localStorage.setItem("ai_quiz_seq_index_v1", seqIndex.toString());
              localStorage.setItem("ai_quiz_active_tab_v1", activeTab);
              localStorage.setItem("ai_quiz_forced_mistakes_v1", JSON.stringify(forcedMistakes));
              localStorage.setItem("ai_quiz_starred_questions_v1", JSON.stringify(starredQuestions));
            } catch (e) {
              console.error("保存进度无法写入 LocalStorage：", e);
            }
          }
        }, [answers, historyPath, currentPathIndex, seqIndex, activeTab, forcedMistakes, starredQuestions]);

        useEffect(() => {
          const timer = setInterval(() => {
            setStudySeconds((prev) => {
              const val = prev + 1;
              try { localStorage.setItem("ai_quiz_study_seconds_v1", val.toString()); } catch (e) {}
              return val;
            });
          }, 1000);
          return () => clearInterval(timer);
        }, []);

        useEffect(() => {
          const handleOutsideClick = () => {
            setTimeout(() => {
              setIsDSearchFocused(false);
              setIsMSearchFocused(false);
              // 【优化】点击空白处时自动收起重置下拉菜单
              setShowResetDropdown(false);
            }, 250);
          };
          window.addEventListener("click", handleOutsideClick);
          return () => window.removeEventListener("click", handleOutsideClick);
        }, []);

        // --- 实时数据计算 ---
        const answeredIds = Object.keys(answers).map(Number);
        const starredIdSet = new Set(starredQuestions);
        const normalQuestionPool = QUESTIONS_DATA.filter((q) => !starredIdSet.has(q.id));
        const reviewQuestionPool = reviewQuestionIds
          .map((id) => QUESTIONS_DATA.find((q) => q.id === id))
          .filter(Boolean);
        const activeQuestionPool = reviewMode ? reviewQuestionPool : normalQuestionPool;
        const totalQuestions = activeQuestionPool.length;

        const correctCount = answeredIds.reduce((acc, id) => {
          const q = QUESTIONS_DATA.find((item) => item.id === id);
          if (q && answers[id] === q.a) return acc + 1;
          return acc;
        }, 0);

        // 升级错题本判定逻辑：原先的错题 + 自主勾选“蒙对了”进入错题本的正确题目
        const mistakesList = QUESTIONS_DATA.filter((q) => {
          if (starredIdSet.has(q.id)) return false;
          const uAns = answers[q.id];
          const isForced = forcedMistakes.includes(q.id);
          return (uAns !== undefined && uAns !== q.a) || isForced;
        });

        const accuracyRate = answeredIds.length > 0 ? Math.round((correctCount / answeredIds.length) * 100) : 0;
        const isQuiz = !reviewMode && activeTab === "quiz";
        const isSeq = !reviewMode && activeTab === "sequential";
        const isReview = reviewMode;

        const formatDuration = (totalSecs) => {
          const hours = Math.floor(totalSecs / 3600);
          const mins = Math.floor((totalSecs % 3600) / 60);
          const secs = totalSecs % 60;
          let out = "";
          if (hours > 0) out += hours + "h";
          out += (mins > 0 ? mins : "0") + "m";
          out += secs + "s";
          return out;
        };

        // --- 核心业务行动 ---
        const handleSelectOption = (optKey, questionId) => {
          if (answers[questionId] !== undefined) return;
          
          const qItem = QUESTIONS_DATA.find(q => q.id === questionId);
          const isMulti = qItem && qItem.a.includes(",");

          if (isMulti) {
            // 多选：在暂存区中切换选中状态
            setLocalMultiSelect((prev) =>
              prev.includes(optKey)
                ? prev.filter((k) => k !== optKey)
                : [...prev, optKey]
            );
          } else {
            // 单选：直接提交答案
            setAnswers((prev) => ({
              ...prev,
              [questionId]: optKey
            }));
            // 【优化】如果单选题在标熟状态下答错了，自动取消标熟标记
            if (qItem && qItem.a !== optKey) {
              setStarredQuestions((prev) => prev.filter((id) => id !== questionId));
            }
          }
        };

        // 多选题主动提交逻辑
        const handleSubmitMultiAnswer = (questionId) => {
          if (localMultiSelect.length === 0) {
            alert("请至少选择一个选项再提交！");
            return;
          }
          const formattedAnswer = [...localMultiSelect].sort().join(", ");
          setAnswers((prev) => ({
            ...prev,
            [questionId]: formattedAnswer
          }));
          // 【优化】如果多选题在标熟状态下答错了，自动取消标熟标记
          const qItem = QUESTIONS_DATA.find(q => q.id === questionId);
          if (qItem && qItem.a !== formattedAnswer) {
            setStarredQuestions((prev) => prev.filter((id) => id !== questionId));
          }
        };

        const handleRevealAnswer = (questionId) => {
          setAnswers((prev) => ({
            ...prev,
            [questionId]: "GIVE_UP"
          }));
          // 【优化】寻求正确解析视为未掌握，如果在标熟状态下则自动取消标熟标记
          setStarredQuestions((prev) => prev.filter((id) => id !== questionId));
        };

        // 新增：“蒙对了”一键收录至错题集处理逻辑
        const handleGuessCorrect = (questionId) => {
          if (!forcedMistakes.includes(questionId)) {
            setForcedMistakes((prev) => [...prev, questionId]);
          }
          // 【优化】用户在这道题点击了“蒙对了“按钮，自动取消标熟标记
          setStarredQuestions((prev) => prev.filter((id) => id !== questionId));
        };

        const isQuizOrSeq = isQuiz || isSeq || isReview;

        // 【修复要点1】在这里提前安全解析出全局的当前题目对象 qObj 以及衍生状态，防止作用域孤岛
        let qObj = null;
        if (isReview) {
          qObj = reviewQuestionPool[reviewSeqIndex] || reviewQuestionPool[0] || null;
        } else if (manualQuestionId !== null) {
          qObj = QUESTIONS_DATA.find((q) => q.id === manualQuestionId) || QUESTIONS_DATA[0];
        } else if (isQuiz) {
          const currentQuestionId = historyPath[currentPathIndex];
          qObj = QUESTIONS_DATA.find((q) => q.id === currentQuestionId) || QUESTIONS_DATA[0];
        } else if (isSeq) {
          qObj = normalQuestionPool[seqIndex] || normalQuestionPool[0] || null;
        }

        const hasAnswered = qObj ? (answers[qObj.id] !== undefined) : false;
        const isMultiQuestion = qObj ? qObj.a.includes(",") : false;
        // 定制解析出当前题目是否属于：用户已经作答且回答正确、是否已被强制移入错题集
        const isUserCorrect = qObj && hasAnswered && answers[qObj.id] === qObj.a;
        const isForcedMistake = qObj ? forcedMistakes.includes(qObj.id) : false;
        const isCurrentStarred = qObj ? starredIdSet.has(qObj.id) : false;

        const extractNextRandomId = (curId) => {
          const unansweredIds = normalQuestionPool.map((q) => q.id).filter((id) => !answeredIds.includes(id));
          const pool = unansweredIds.length > 0 ? unansweredIds : QUESTIONS_DATA.map((q) => q.id);
          let filtered = pool.filter((id) => id !== curId);
          if (filtered.length === 0) filtered = QUESTIONS_DATA.map((q) => q.id);
          return filtered[Math.floor(Math.random() * filtered.length)];
        };

        const findNextVisibleIndex = (startIndex) => {
          for (let index = startIndex; index < historyPath.length; index += 1) {
            if (!starredIdSet.has(historyPath[index])) return index;
          }
          for (let index = startIndex - 1; index >= 0; index -= 1) {
            if (!starredIdSet.has(historyPath[index])) return index;
          }
          return startIndex;
        };

        const jumpToQuestionId = (id) => {
          setLocalMultiSelect([]); // 切题时清空上道题的多选暂存
          setManualQuestionId(id);
          setReviewMode(false);
          setReviewQuestionIds([]);
          setReviewSeqIndex(0);
          const targetIndex = normalQuestionPool.findIndex((q) => q.id === id);
          if (targetIndex !== -1) setSeqIndex(targetIndex);

          const idxInHistory = historyPath.indexOf(id);
          if (idxInHistory !== -1) {
            setCurrentPathIndex(findNextVisibleIndex(idxInHistory));
          } else {
            const newPath = [...historyPath.slice(0, currentPathIndex + 1), id];
            setHistoryPath(newPath);
            setCurrentPathIndex(newPath.length - 1);
          }
          if (activeTab === "mistakes") setActiveTab("sequential");
        };

        const handleNextQuestion = () => {
          setLocalMultiSelect([]);
          setManualQuestionId(null);
          if (reviewMode) {
            if (reviewSeqIndex < reviewQuestionPool.length - 1) setReviewSeqIndex((prev) => prev + 1);
            return;
          }
          if (isSeq) {
            if (seqIndex < normalQuestionPool.length - 1) setSeqIndex((prev) => prev + 1);
          } else {
            if (!qObj) return;
            if (currentPathIndex < historyPath.length - 1) {
              setCurrentPathIndex(findNextVisibleIndex(currentPathIndex + 1));
            } else {
              const nextId = extractNextRandomId(qObj.id);
              setHistoryPath([...historyPath, nextId]);
              setCurrentPathIndex(historyPath.length);
            }
          }
        };

        const handlePrevQuestion = () => {
          setLocalMultiSelect([]);
          setManualQuestionId(null);
          if (reviewMode) {
            if (reviewSeqIndex > 0) setReviewSeqIndex((prev) => prev - 1);
            return;
          }
          if (isSeq) {
            if (seqIndex > 0) setSeqIndex((prev) => prev - 1);
          } else {
            if (currentPathIndex > 0) setCurrentPathIndex(findNextVisibleIndex(currentPathIndex - 1));
          }
        };

        const handleMarkStar = (questionId) => {
          const isAlreadyStarred = starredQuestions.includes(questionId);
          if (isAlreadyStarred) {
            if (manualQuestionId !== questionId) return;
            setStarredQuestions((prev) => prev.filter((id) => id !== questionId));
            setForcedMistakes((prev) => prev.filter((id) => id !== questionId));
            setAnswers((prev) => {
              if (prev[questionId] === undefined) return prev;
              const copy = { ...prev };
              delete copy[questionId];
              return copy;
            });
            return;
          }
          setStarredQuestions((prev) => (prev.includes(questionId) ? prev : [...prev, questionId]));
          setForcedMistakes((prev) => prev.filter((id) => id !== questionId));
          setAnswers((prev) => {
            if (prev[questionId] === undefined) return prev;
            const copy = { ...prev };
            delete copy[questionId];
            return copy;
          });
          if (reviewMode) {
            setReviewQuestionIds((prev) => prev.filter((id) => id !== questionId));
            return;
          }
          setHistoryPath((prev) => {
            const nextPath = prev.filter((id) => id !== questionId);
            if (nextPath.length === 0) return prev;
            if (isQuiz) {
              setCurrentPathIndex((currentIndex) => Math.min(currentIndex, nextPath.length - 1));
            }
            return nextPath;
          });
          if (isSeq) {
            setSeqIndex((currentIndex) => Math.max(0, Math.min(currentIndex, normalQuestionPool.length - 2)));
          }
        };

        const handleExitReviewMode = () => {
          // 【优化】拦截并检查本次重刷中未答对（包含未作答和答错）的题目，重新放回正常模式错题本
          setAnswers((prev) => {
            const copy = { ...prev };
            reviewQuestionIds.forEach((id) => {
              const q = QUESTIONS_DATA.find((item) => item.id === id);
              if (q && copy[id] !== q.a) {
                // 如果题目未作答，赋予其 GIVE_UP 状态以重新计入错题本；已答错的题目保留其当前错误答案即可
                if (copy[id] === undefined) {
                  copy[id] = "GIVE_UP";
                }
              }
            });
            return copy;
          });
          setReviewMode(false);
          setReviewQuestionIds([]);
          setReviewSeqIndex(0);
          setActiveTab("sequential");
          setLocalMultiSelect([]);
        };

        const handleBatchRetryMistakes = () => {
          if (mistakesList.length === 0) return;
          const mistakeIds = mistakesList.map((item) => item.id);
          setAnswers((prev) => {
            const copy = { ...prev };
            mistakeIds.forEach((id) => { delete copy[id]; });
            return copy;
          });
          setForcedMistakes((prev) => prev.filter((id) => !mistakeIds.includes(id)));
          setReviewQuestionIds(mistakeIds);
          setReviewSeqIndex(0);
          setReviewMode(true);
          setActiveTab("sequential");
          setLocalMultiSelect([]);
        };

        useEffect(() => {
          if (reviewMode) return;
          if (isSeq && seqIndex >= normalQuestionPool.length) {
            setSeqIndex(Math.max(0, normalQuestionPool.length - 1));
          }
          if (isQuiz && currentPathIndex >= historyPath.length) {
            setCurrentPathIndex(Math.max(0, historyPath.length - 1));
          }
        }, [reviewMode, isSeq, isQuiz, seqIndex, currentPathIndex, normalQuestionPool.length, historyPath.length]);

        // 【优化】重构重置核心函数，支持条件化重置标熟记录
        const executeResetProgress = (includeStarred) => {
          const targetStarred = includeStarred ? [] : starredQuestions;
          const startPool = QUESTIONS_DATA.filter((q) => !targetStarred.includes(q.id));
          const initialQ = (startPool.length > 0 ? startPool : QUESTIONS_DATA)[Math.floor(Math.random() * (startPool.length > 0 ? startPool.length : QUESTIONS_DATA.length))];
          
          setAnswers({});
          setForcedMistakes([]); 
          setReviewMode(false);
          setReviewQuestionIds([]);
          setReviewSeqIndex(0);
          setShowGuide(true);
          try { localStorage.removeItem("ai_quiz_guide_seen_v1"); } catch (e) {}
          
          if (includeStarred) {
            setStarredQuestions([]);
          }
          
          setHistoryPath([initialQ.id]);
          setCurrentPathIndex(0);
          setSeqIndex(0);
          setStudySeconds(0);
          setActiveTab("sequential");
          setLocalMultiSelect([]);
          setShowResetDropdown(false);
        };

        const handleRetryQuestion = (id) => {
          setLocalMultiSelect([]);
          setForcedMistakes((prev) => prev.filter((mid) => mid !== id)); // 重做题目时，将其移出自主添加的错题集合
          setAnswers((prev) => {
            const copy = { ...prev };
            delete copy[id];
            return copy;
          });
          jumpToQuestionId(id);
        };

        const handleClearAllMistakes = () => {
          if (confirm("该操作将清除您当前记录的所有错题记录（但已独立答对的正确题型进度会继续保留）。确定要继续吗？")) {
            setForcedMistakes([]); // 清空强制存储的对题记录
            setAnswers((prev) => {
              const copy = { ...prev };
              mistakesList.forEach((item) => { delete copy[item.id]; });
              return copy;
            });
            setActiveTab("sequential");
          }
        };

        const closeGuide = () => {
          try {
            localStorage.setItem("ai_quiz_guide_seen_v1", "1");
          } catch (e) {}
          setShowGuide(false);
        };

        const getFuzzyMatches = (query) => {
          const clean = query.trim().toLowerCase();
          if (!clean) return [];
          return QUESTIONS_DATA.filter((q) => {
            return (
              q.id.toString() === clean ||
              q.c.toLowerCase().includes(clean) ||
              q.s.toLowerCase().includes(clean) ||
              q.e.toLowerCase().includes(clean) ||
              q.o.some((opt) => opt.toLowerCase().includes(clean))
            );
          });
        };

        const handleExportData = () => {
          const backupData = { answers, seqIndex, studySeconds, historyPath, currentPathIndex, forcedMistakes, starredQuestions };
          const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData));
          const downloadAnchor = document.createElement('a');
          downloadAnchor.setAttribute("href", dataStr);
          downloadAnchor.setAttribute("download", `AI导论答题系统备份_${new Date().toISOString().slice(0,10)}.json`);
          document.body.appendChild(downloadAnchor);
          downloadAnchor.click();
          downloadAnchor.remove();
        };

        const handleImportData = (e) => {
          const fileReader = new FileReader();
          if (!e.target.files || e.target.files.length === 0) return;
          fileReader.onload = (event) => {
            try {
              const parsed = JSON.parse(event.target.result);
              if (parsed.answers) setAnswers(parsed.answers);
              if (parsed.seqIndex !== undefined) setSeqIndex(parsed.seqIndex);
              if (parsed.studySeconds !== undefined) setStudySeconds(parsed.studySeconds);
              if (parsed.historyPath) setHistoryPath(parsed.historyPath);
              if (parsed.currentPathIndex !== undefined) setCurrentPathIndex(parsed.currentPathIndex);
              if (parsed.forcedMistakes) setForcedMistakes(parsed.forcedMistakes);
              if (parsed.starredQuestions) setStarredQuestions(parsed.starredQuestions);
              alert("历史做题进度已成功恢复！");
            } catch (err) {
              alert("备份文件解析失败，请确保导入了正确的 json 格式备份。");
            }
          };
          fileReader.readAsText(e.target.files[0]);
        };

        return (
          <div className="w-full h-screen h-[100dvh] bg-[#F8FAFC] text-[#1E293B] font-sans flex flex-col overflow-hidden select-none">
            
            {/* 顶部通栏 HEADER */}
            <header className="bg-white border-b border-[#E2E8F0] shadow-sm shrink-0 z-10">
              <div className="max-w-6xl mx-auto px-4 py-2.5 md:py-3 flex flex-row items-center justify-between gap-4">
                <div className="flex items-center gap-2.5">
                  {/* 【优化】将静态 div 改造为可点击按钮，实现点击图标弹出说明页；同时加入 flex items-center justify-center 彻底解决图标下方多出几像素留白的问题 */}
                  <button onClick={() => setShowGuide(true)} className="flex items-center justify-center p-1.5 md:p-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl shadow-md shrink-0 transition-all active:scale-95 cursor-pointer animate-fadeIn" title="查看使用说明">
                    <Icon name="book-open" className="w-5 h-5 md:w-6 md:h-6 text-indigo-50" />
                  </button>

                          let iconColor = "text-amber-500";

                          if (isUserCorrect) {
                            statusText = "回答正确"; statusIcon = "check-circle"; badgeBg = "bg-green-50 border-green-200 text-green-700"; iconColor = "text-green-600";
                          } else if (!isGiveUp) {
                            statusText = "回答错误"; statusIcon = "x-circle"; badgeBg = "bg-rose-50 border-rose-200 text-rose-700"; iconColor = "text-rose-500";
                          }

                          return (
                            <div className="bg-slate-50 border border-slate-200/60 rounded-xl p-3 md:p-5 mt-3 space-y-2 animate-fadeIn">
                              <div className="flex items-center justify-between flex-wrap gap-2 text-[13px] md:text-sm lg:text-base">
                                <div className={`flex items-center gap-1.5 px-3 py-1 rounded-md border font-bold shadow-sm text-[13px] md:text-sm lg:text-base ${badgeBg}`}>
                                  <Icon name={statusIcon} className={`w-4 h-4 md:w-4.5 md:h-4.5 ${iconColor}`} />
                                  <span>{statusText}</span>
                                </div>
                                <span className="text-slate-600 font-semibold">正确答案: <strong className="text-green-600 text-base md:text-lg font-mono font-bold pl-1">{qObj.a}</strong></span>
                              </div>
                              <div className="text-[13px] md:text-base lg:text-lg text-slate-600 leading-relaxed font-sans pt-1 border-t border-slate-200/40">
                                <strong className="text-slate-900 font-bold block mb-1">解析：</strong>
                                <FormattedText text={qObj.e} />
                              </div>
                            </div>
                          );
                        })()}
                      </div>

                      {/* 底栏操作功能键 */}
                      <div className="px-3 py-2.5 md:px-5 md:py-4 bg-slate-50 border-t border-slate-100 flex flex-row items-center gap-1.5 md:gap-3 shrink-0">
                        <button onClick={handlePrevQuestion} disabled={isReview ? reviewSeqIndex <= 0 : (isSeq ? seqIndex <= 0 : currentPathIndex <= 0)} className="flex-1 flex items-center justify-center gap-1 bg-white hover:bg-slate-100 border border-slate-250 text-slate-700 disabled:opacity-40 py-2.5 md:py-3.5 rounded-xl text-[12px] md:text-base lg:text-lg font-bold transition-all cursor-pointer disabled:cursor-not-allowed text-center shadow-sm">
                          <Icon name="chevron-left" className="w-3.5 h-3.5 md:w-5 md:h-5" />
                          <span>上一题</span>
                        </button>
                        
                        {/* 如果是多选题，且当前处于未提交状态，就在底栏中并列插入醒目的“确认提交”按钮 */}
                        {isMultiQuestion && !hasAnswered && (
                          <button onClick={() => handleSubmitMultiAnswer(qObj.id)} className="flex-1 flex items-center justify-center gap-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 md:py-3.5 rounded-xl text-[12px] md:text-base lg:text-lg font-bold transition-all cursor-pointer text-center shadow-md shadow-indigo-100">
                            <Icon name="check-square" className="w-3.5 h-3.5 md:w-5 md:h-5" />
                            <span>确认提交</span>
                          </button>
                        )}

                        {/* 看答案 / 蒙对了 功能核心升级按钮 */}
                        <button 
                          onClick={() => {
                            if (isUserCorrect) {
                              handleGuessCorrect(qObj.id);
                            } else {
                              handleRevealAnswer(qObj.id);
                            }
                          }} 
                          disabled={(hasAnswered && !isUserCorrect) || isForcedMistake} 
                          className={`flex-1 flex items-center justify-center gap-1 py-2.5 md:py-3.5 rounded-xl text-[12px] md:text-base lg:text-lg font-bold transition-all text-center shadow-sm cursor-pointer disabled:cursor-not-allowed ${
                            isUserCorrect 
                              ? (isForcedMistake 
                                ? "bg-slate-100 border border-slate-200 text-slate-400 opacity-60" 
                                : "bg-orange-50 hover:bg-orange-100 border border-orange-200 text-orange-800") 
                              : "bg-yellow-50 hover:bg-yellow-100 border border-yellow-200 text-yellow-800 disabled:opacity-50"
                          }`}
                        >
                          <Icon name={isUserCorrect ? (isForcedMistake ? "archive" : "frown") : "help-circle"} className="w-3.5 h-3.5 md:w-5 md:h-5" />
                          <span>{isUserCorrect ? (isForcedMistake ? "已入错题" : "蒙对了") : "看答案"}</span>
                        </button>
                        
                        <button onClick={handleNextQuestion} disabled={isReview ? reviewSeqIndex >= reviewQuestionPool.length - 1 : (isSeq && seqIndex >= normalQuestionPool.length - 1)} className="flex-1 flex items-center justify-center gap-1 bg-indigo-600 hover:bg-indigo-700 text-white disabled:opacity-40 disabled:cursor-not-allowed py-2.5 md:py-3.5 rounded-xl text-[12px] md:text-base lg:text-lg font-bold transition-all cursor-pointer text-center shadow-md shadow-indigo-50">
                          <span>下一题</span>
                          <Icon name="chevron-right" className="w-3.5 h-3.5 md:w-5 md:h-5" />
                        </button>
                      </div>

                    </div>
                  </div>
                )}

                {/* TAB 2: 错题本 */}
                {activeTab === "mistakes" && (
                  <div className="flex-1 bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl border border-[#E2E8F0] shadow-sm flex flex-col min-h-0 overflow-hidden animate-fadeIn">
                    <div className="pb-3 border-b border-rose-100 flex items-center justify-between flex-wrap gap-2 shrink-0">
                      <div className="min-w-0">
                        <h2 className="text-sm md:text-base lg:text-lg font-bold text-slate-950 flex items-center gap-1.5 leading-none">
                          <span className="p-0.5 px-2 bg-rose-100 text-rose-700 rounded-md text-[10px] md:text-xs font-semibold">错题</span>
                          <span>错题复习本 ({mistakesList.length} 题)</span>
                        </h2>
                        <p className="text-[9px] md:text-xs text-slate-400 mt-1.5 leading-tight truncate">作答错误或直接寻求正确解析的题目。吃透错题方能登峰造极！</p>
                      </div>
                      {mistakesList.length > 0 && (
                        <div className="flex items-center gap-1.5 shrink-0">
                          <button onClick={handleBatchRetryMistakes} className="text-[10px] md:text-xs bg-indigo-600 hover:bg-indigo-700 border border-indigo-600 text-white px-2.5 py-1.5 rounded-lg transition-all font-semibold cursor-pointer shadow-sm active:scale-95">批量重刷</button>
                          <button onClick={handleClearAllMistakes} className="text-[10px] md:text-xs bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-700 px-2.5 py-1.5 rounded-lg transition-all font-semibold cursor-pointer">清空错题记录</button>
                        </div>
                      )}
                    </div>

                    <div className="flex-1 flex flex-col min-h-0 overflow-y-auto mt-3 pr-0.5 space-y-3.5">
                      {mistakesList.length === 0 ? (
                        <div className="py-12 md:py-20 text-center text-[#94A3B8] flex flex-col items-center justify-center">
                          <div className="w-10 h-10 md:w-12 md:h-12 bg-green-50 rounded-full flex items-center justify-center text-green-500 mb-3 border border-green-100 shadow-sm font-bold">✓</div>
                          <p className="text-xs md:text-sm font-semibold text-green-700">太棒了，目前没有任何错题记录！</p>
                          <p className="text-[10px] md:text-xs mt-1.5 text-slate-400 max-w-sm px-4">在“顺序刷题”或“随机刷题”练习中做错或直接看答案的题，会自动归入该界面。</p>
                          <button onClick={() => setActiveTab("sequential")} className="mt-4 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl transition-all cursor-pointer shadow-md shadow-indigo-100">去答题卡练习</button>
                        </div>
                      ) : (
                        mistakesList.map((item) => {
                          const userOpt = answers[item.id];
                          const isForcedHere = forcedMistakes.includes(item.id);
                          return (
                            <div key={item.id} className="p-3 md:p-4.5 bg-rose-50/20 border border-rose-100/80 rounded-xl space-y-2.5 flex flex-col justify-between">
                              <div>
                                <div className="flex flex-wrap items-center gap-1.5 text-[9px] md:text-sm mb-1.5">
                                  <span className="px-1.5 py-0.5 bg-rose-100 text-rose-800 font-mono font-bold rounded text-[9px] md:text-xs">题号 No.{item.id}</span>
                                  <span className="bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded-full text-[9px] md:text-xs">{item.c}</span>
                                  <span className="ml-auto text-rose-700 font-mono text-[11px] md:text-sm">你的解答: <strong>{isForcedHere ? `${item.a} (标记为蒙对)` : (userOpt === "GIVE_UP" ? "求助看答案" : userOpt)}</strong></span>
                                  <span className="text-green-700 font-mono pl-1.5 border-l border-rose-200 font-semibold text-[11px] md:text-sm">标准正确: <strong>{item.a}</strong></span>
                                </div>

                                <h4 className="text-[15px] md:text-base lg:text-lg font-bold text-slate-900 leading-normal mb-2"><FormattedText text={item.s} /></h4>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-1 mb-2.5">
                                  {item.o.map((opt, oIdx) => {
                                    const optLetter = OPTION_KEYS[oIdx];
                                    const isCorrect = item.a.includes(optLetter);
                                    const isSelected = userOpt && userOpt.includes(optLetter);
                                    return (
                                      <div key={optLetter} className={`px-2 py-1.5 rounded text-[12px] md:text-sm lg:text-base font-semibold ${isCorrect ? "bg-green-100/70 border border-green-250 text-green-900" : isSelected ? "bg-rose-100/70 border border-rose-250 text-rose-900" : "bg-slate-50 text-slate-400 opacity-80"}`}>
                                        <strong className="mr-1 font-mono">{optLetter}.</strong>
                                        <FormattedText text={opt} />
                                      </div>
                                    );
                                  })}
                                </div>

                                <div className="bg-white p-2.5 md:p-4 rounded-lg border border-rose-100/50 text-[11px] md:text-sm lg:text-base text-[#475569] leading-relaxed">
                                  <strong className="text-slate-950 font-semibold block mb-0.5 text-[11px] md:text-sm lg:text-base">教材考点必读解析：</strong>
                                  <FormattedText text={item.e} />
                                </div>
                              </div>

                              <div className="flex items-center justify-between pt-2 border-t border-rose-100/45 mt-1">
                                <span className="text-[9px] text-[#64748B] italic">人工智能教学组课纲真题</span>
                                <button onClick={() => handleRetryQuestion(item.id)} className="px-3 py-1 bg-indigo-600 hover:bg-indigo-700 text-white text-[10px] md:text-xs font-semibold rounded-lg transition-all cursor-pointer shadow-sm active:scale-95">回题目重刷</button>
                              </div>
                            </div>
                          );
                        })
                      )}
                    </div>
                  </div>
                )}

              </div>
            </main>

            {showGuide && (
              <div className="fixed inset-0 z-[80] bg-slate-950/45 backdrop-blur-sm flex items-center justify-center p-4">
                <div className="w-full max-w-2xl max-h-[88dvh] bg-[#F8FAFC] rounded-3xl shadow-2xl border border-white/70 overflow-hidden animate-fadeIn flex flex-col">
                  <div className="px-5 py-4 bg-white border-b border-slate-200 flex items-center justify-between gap-3 shrink-0">
                    <div className="flex items-center gap-3 min-w-0">
                      {/* 【优化】增加 flex items-center justify-center 实现完美正圆/正方比例 */}
                      <div className="flex items-center justify-center p-2 bg-indigo-600 text-white rounded-2xl shadow-md shrink-0">
                        <Icon name="book-open" className="w-5 h-5 text-indigo-50" />
                      </div>
                      <div className="min-w-0">
                        <p className="text-[11px] font-bold text-indigo-600 uppercase tracking-wider">Welcome</p>
                        <h3 className="text-base md:text-xl font-bold text-slate-950 leading-tight">欢迎使用《人工智能导论》刷题系统</h3>
                        <p className="text-xs md:text-sm text-slate-500 mt-1">这是一份离线可用、自动记录进度的课程真题练习工具。</p>
                      </div>
                    </div>
                    {/* 【优化】增加 flex items-center justify-center 强行对齐横纵轴，使点击框上下左右绝对对称 */}
                    <button onClick={closeGuide} className="flex items-center justify-center p-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-500 transition-all shrink-0" title="关闭说明">
                      <Icon name="x" className="w-5 h-5 text-slate-500" />
                    </button>
                  </div>
                  
                  {/* 弹窗主体内容区 */}
                  <div className="p-4 md:p-5 overflow-y-auto space-y-4">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                      <div className="bg-white border border-slate-200 rounded-2xl p-3 shadow-sm">
                        <div className="flex items-center gap-2 font-bold text-slate-950 mb-1"><Icon name="list-ordered" className="w-4 h-4 text-indigo-600" />刷题模式</div>
                        <p className="text-xs md:text-sm text-slate-600 leading-6">“顺序刷题”按题号推进；“随机刷题”随机抽取未作答题；底部“上一题 / 下一题”用于切换。</p>
                      </div>
                      <div className="bg-white border border-slate-200 rounded-2xl p-3 shadow-sm">
                        <div className="flex items-center gap-2 font-bold text-slate-950 mb-1"><Icon name="check-square" className="w-4 h-4 text-indigo-600" />答题与解析</div>
                        <p className="text-xs md:text-sm text-slate-600 leading-6">单选会自动提交，多选需点“确认提交”；点“看答案”会显示解析并自动计入错题。</p>
                      </div>
                      
                      {/* 【优化】在“答题与解析”后面新增“看答案”功能的独立介绍标签，文案风格与整体保持严格一致 */}
                      <div className="bg-white border border-slate-200 rounded-2xl p-3 shadow-sm">
                        <div className="flex items-center gap-2 font-bold text-slate-950 mb-1"><Icon name="eye" className="w-4 h-4 text-indigo-600" />“看答案”功能</div>
                        <p className="text-xs md:text-sm text-slate-600 leading-6">点击后可直接查看正确答案与核心解析；寻求解析将被视为未掌握，系统会自动取消该题的标熟状态并将其丢回错题本。</p>
                      </div>
                      
                      <div className="bg-white border border-slate-200 rounded-2xl p-3 shadow-sm">
                        <div className="flex items-center gap-2 font-bold text-slate-950 mb-1"><Icon name="star" className="w-4 h-4 text-amber-500" />标熟功能</div>
                        <p className="text-xs md:text-sm text-slate-600 leading-6">题目右上角“标熟”可隐藏已掌握题目；若在标熟状态下答错或点击“蒙对了”，系统会自动取消标熟并重新加入错题本。</p>
                      </div>

                      <div className="bg-white border border-slate-200 rounded-2xl p-3 shadow-sm">
                        <div className="flex items-center gap-2 font-bold text-slate-950 mb-1"><Icon name="book-marked" className="w-4 h-4 text-rose-500" />错题本</div>
                        <p className="text-xs md:text-sm text-slate-600 leading-6">做错、看答案、或点“蒙对了”的题会进入错题本；可单题重刷，也可“批量重刷”。</p>
                      </div>
                      <div className="bg-white border border-slate-200 rounded-2xl p-3 shadow-sm">
                        <div className="flex items-center gap-2 font-bold text-slate-950 mb-1"><Icon name="repeat" className="w-4 h-4 text-indigo-600" />批量重刷</div>
                        <p className="text-xs md:text-sm text-slate-600 leading-6">进入重刷模式后可再次作答；若中途点“返回”，本次重刷未做对的题目将重新丢回错题本。</p>
                      </div>
                      {/* 【优化】将原有的混合功能说明拆分为两个相互独立、风格完全统一的小卡片 */}
                      <div className="bg-white border border-slate-200 rounded-2xl p-3 shadow-sm">
                        <div className="flex items-center gap-2 font-bold text-slate-950 mb-1"><Icon name="search" className="w-4 h-4 text-indigo-600" />题目搜索</div>
                        <p className="text-xs md:text-sm text-slate-600 leading-6">可按题号、核心关键词或特定考点名称进行快捷模糊检索，方便快速查找并精准跳转到对应题目。</p>
                      </div>
                      <div className="bg-white border border-slate-200 rounded-2xl p-3 shadow-sm">
                        <div className="flex items-center gap-2 font-bold text-slate-950 mb-1"><Icon name="database" className="w-4 h-4 text-indigo-600" />备份与重置</div>
                        <p className="text-xs md:text-sm text-slate-600 leading-6">支持做题进度导出备份与从文件恢复；点击顶部的“重置”按钮可自由选择仅清空当前答题进度或同步清除标熟记录。</p>
                      </div>
                    </div>
                  </div> {/* 精确闭合 p-4 md:p-5 主体内容区 */}
                  
                  {/* 【优化】底部的“开始刷题”外层 bg-white 容器及 button 按钮已被彻底安全剥离，此行直接转入外窗闭合 */}
                </div>
              </div>
            )}

            {/* 手机端专属：底部输入框以及开发者信息 */}
            <div className="lg:hidden shrink-0 mt-auto bg-white border-t border-slate-200 px-4 py-2.5 flex flex-col gap-2 z-20" onClick={(e) => e.stopPropagation()}>
              <div className="relative">
                {isMSearchFocused && mQuery && (
                  <div className="absolute left-0 right-0 bottom-full mb-1 max-h-44 overflow-y-auto bg-white border border-slate-200 rounded-xl shadow-xl z-50 divide-y divide-slate-100 animate-fadeIn">
                    {mResults.length === 0 ? ( <div className="p-3 text-sm text-slate-400 text-center">暂无搜索结果</div> ) : (
                      mResults.map((item) => (
                        <div key={item.id} onClick={(e) => { e.stopPropagation(); jumpToQuestionId(item.id); setIsMSearchFocused(false); setMQuery(""); }} className="p-2.5 hover:bg-slate-50 cursor-pointer text-left text-sm transition-all">
                          <div className="flex items-center justify-between mb-1">
                            <span className="font-mono font-bold text-indigo-600 text-sm">No.{item.id}</span>
                            <span className="text-xs bg-indigo-50 text-indigo-700 px-1 rounded font-medium">{item.c}</span>
                          </div>
                          <p className="text-slate-700 truncate">{item.s}</p>
                        </div>
                      ))
                    )}
                  </div>
                )}

                <div className="relative flex items-center">
                  <input type="text" value={mQuery} onChange={(e) => { setMQuery(e.target.value); setMResults(getFuzzyMatches(e.target.value)); }} onFocus={(e) => { e.stopPropagation(); setIsMSearchFocused(true); }} placeholder="输入关键字、考点等检索真题..." className="w-full pl-9 pr-8 py-2 bg-slate-50 border border-slate-200 focus:outline-none focus:ring-1 focus:ring-indigo-500 rounded-xl text-sm placeholder:text-slate-400 font-sans" />
                  <span className="absolute left-2.5 flex items-center justify-center"><Icon name="search" className="w-4 h-4 text-slate-400" /></span>
                  {mQuery && <button onClick={(e) => { e.stopPropagation(); setMQuery(""); setMResults([]); }} className="absolute right-2.5 flex items-center justify-center text-slate-400 hover:text-slate-600"><Icon name="x" className="w-4 h-4" /></button>}
                </div>
              </div>

              <div className="py-1 px-1 border-t border-slate-100/80 flex flex-row items-center justify-between text-slate-500 select-none shrink-0">
                <div className="flex items-center gap-1.5 text-xs md:text-sm">
                  <span className="text-[10px] font-mono font-bold bg-indigo-50 border border-indigo-120 text-indigo-600 px-1.5 rounded leading-none py-0.5">CC</span>
                  <span>开发者：<strong className="text-slate-800 font-mono">小红书@最伟大的CC</strong></span>
                </div>
                <span className="text-[11px] text-green-600 font-mono font-bold flex items-center gap-1 scale-90 origin-right">
                  <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                  100% 离线部署
                </span>
              </div>
            </div>

          </div>
        );
      }

      // 挂载
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</html>
